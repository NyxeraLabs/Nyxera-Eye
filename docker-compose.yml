services:
  mongodb:
    image: mongo:7.0
    container_name: nyxera-mongodb
    restart: unless-stopped
    command: ["mongod", "--config", "/etc/mongod.conf"]
    security_opt:
      - no-new-privileges:true
    volumes:
      - mongo_data:/data/db
      - ./config/mongodb/mongod.conf:/etc/mongod.conf:ro
    networks:
      - nyxera_internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: nyxera-opensearch
    restart: unless-stopped
    environment:
      discovery.type: "single-node"
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    security_opt:
      - no-new-privileges:true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - nyxera_internal
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: redis:7.2-alpine
    container_name: nyxera-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_data:/data
    networks:
      - nyxera_internal

  minio:
    image: minio/minio:latest
    container_name: nyxera-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: nyxeraadmin
      MINIO_ROOT_PASSWORD: nyxera-change-me
    security_opt:
      - no-new-privileges:true
    volumes:
      - minio_data:/data
    networks:
      - nyxera_internal

  minio-init:
    image: minio/mc:latest
    container_name: nyxera-minio-init
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ROOT_USER: nyxeraadmin
      MINIO_ROOT_PASSWORD: nyxera-change-me
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    volumes:
      - ./config/minio/bootstrap.sh:/bootstrap.sh:ro
    networks:
      - nyxera_internal

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: nyxera-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - nyxera_internal

  grafana:
    image: grafana/grafana:11.1.4
    container_name: nyxera-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: nyxeraadmin
      GF_SECURITY_ADMIN_PASSWORD: nyxera-change-me
      GF_USERS_ALLOW_SIGN_UP: "false"
    security_opt:
      - no-new-privileges:true
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - nyxera_internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nyxera-api
    restart: unless-stopped
    environment:
      NYXERA_API_BOOTSTRAP_TOKEN: nyxera-dev-token
      NYXERA_API_BOOTSTRAP_ROLE: admin
    security_opt:
      - no-new-privileges:true
    depends_on:
      - redis
      - mongodb
      - opensearch
    networks:
      - nyxera_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyxera-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_NYXERA_API_BASE: /api/nyxera
      NEXT_PUBLIC_NYXERA_API_TOKEN: nyxera-dev-token
      NYXERA_BACKEND_URL: http://api:18080
    security_opt:
      - no-new-privileges:true
    depends_on:
      - api
    networks:
      - nyxera_internal

  nginx:
    image: nginx:1.27.2-alpine
    container_name: nyxera-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    depends_on:
      - grafana
      - prometheus
      - minio
      - opensearch
      - api
      - frontend
    ports:
      - "127.0.0.1:8443:8443"
      - "127.0.0.1:8444:8444"
      - "127.0.0.1:8445:8445"
      - "127.0.0.1:8446:8446"
      - "127.0.0.1:8447:8447"
      - "127.0.0.1:8448:8448"
      - "127.0.0.1:8449:8449"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    networks:
      - nyxera_internal

volumes:
  mongo_data:
  opensearch_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  nyxera_internal:
    name: nyxera-internal
