worker_processes auto;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server_tokens off;
  client_max_body_size 10m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  server {
    listen 8443 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $grafana_upstream grafana:3000;
      proxy_pass http://$grafana_upstream;
    }
  }

  server {
    listen 8444 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $prometheus_upstream prometheus:9090;
      proxy_pass http://$prometheus_upstream;
    }
  }

  server {
    listen 8445 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $minio_console_upstream minio:9001;
      proxy_pass http://$minio_console_upstream;
    }
  }

  server {
    listen 8446 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $minio_api_upstream minio:9000;
      proxy_pass http://$minio_api_upstream;
    }
  }

  server {
    listen 8447 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $opensearch_upstream opensearch:9200;
      proxy_pass http://$opensearch_upstream;
    }
  }

  server {
    listen 8448 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $api_upstream api:18080;
      proxy_pass http://$api_upstream;
    }
  }

  server {
    listen 8449 ssl;
    ssl_certificate /etc/nginx/certs/nyxera.crt;
    ssl_certificate_key /etc/nginx/certs/nyxera.key;
    location / {
      set $frontend_upstream frontend:3001;
      proxy_pass http://$frontend_upstream;
    }
  }
}
